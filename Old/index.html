<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jonathan McGhee — Design Lead / Director</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,300;0,6..12,400;0,6..12,600;0,6..12,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      color: #000000;
    }

    /* ── Outer container ── */
    .page {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 10px 10px;
      min-height: 100vh;
    }

    /* ── Content column ── */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
      gap: 24px;
      width: 100%;
      max-width: 1001px;
      position: relative;
    }

    /* ── Line 1 — 4px top rule ── */
    .line-1 {
      width: 100%;
      border: none;
      border-top: 4px solid #000000;
    }

    /* ── Header row ── */
    .header {
      display: flex;
      flex-direction: row;
      align-items: center;
      width: 100%;
      gap: 10px;
      position: relative;
      min-height: 41px;
    }

    .header-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .header-text h1 {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 400;
      font-size: 24px;
      line-height: 150%;
      color: #000000;
      white-space: nowrap;
    }

    .header-text .subtitle {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888888;
      white-space: nowrap;
    }

    /* ── Hero wrapper — positioning context for the logo ── */
    .hero-wrapper {
      position: relative;
      width: 100%;
      overflow: visible;
    }

    /* ── JM Logo — overlaps top-right edge of hero ── */
    .jm-logo {
      position: absolute;
      right: 0;
      top: 0;
      transform: translateY(-40%);
      width: clamp(100px, 11vw, 160px);
      height: clamp(100px, 11vw, 160px);
      object-fit: contain;
      z-index: 2;
    }

    /* ── Hero slideshow ── */
    .hero {
      width: 100%;
      aspect-ratio: 1000 / 483;
      background: #b8e0ed;
      overflow: hidden;
      position: relative;
    }

    .hero .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    .hero .slide.active {
      opacity: 1;
    }

    .hero .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Dot indicators */
    .hero-dots {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 7px;
      z-index: 3;
    }

    .hero-dots button {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      padding: 0;
      transition: background 0.3s;
    }

    .hero-dots button.active {
      background: #ffffff;
    }

    /* ── Coming soon ── */
    .coming-soon {
      width: 100%;
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 400;
      font-size: 24px;
      line-height: 173.1%;
      color: #000000;
    }

    /* ── Line 3 — 1px rule ── */
    .line-3 {
      width: 100%;
      border: none;
      border-top: 1px solid #000000;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 40px;
      width: 100%;
      flex-wrap: wrap;
      padding-bottom: 20px;
    }

    .footer-item {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #000000;
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 400;
      font-size: 16px;
      line-height: 173.1%;
      transition: opacity 0.15s;
    }

    .footer-item:hover { opacity: 0.5; }

    .footer-item .linkedin-icon {
      width: 20px;
      height: 19px;
      object-fit: contain;
    }

    .footer-item svg {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .page { padding: 24px 16px 16px; }
      .header-text h1 { font-size: 20px; }
      .jm-logo { width: 90px; height: 90px; }
      .coming-soon { font-size: 20px; }
      .footer { gap: 20px; }
      .footer-item { font-size: 14px; }
    }

    @media (max-width: 480px) {
      .hero { aspect-ratio: 4 / 3; }
      .footer { flex-direction: column; align-items: flex-start; gap: 16px; }
      .jm-logo { width: 64px; height: 64px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="content">

      <hr class="line-1">

      <div class="header">
        <div class="header-text">
          <h1>Jonathan McGhee</h1>
          <p class="subtitle">Design Lead / Director</p>
        </div>
      </div>

      <!-- Hero wrapper: logo is anchored here so it overlaps the top-right edge -->
      <div class="hero-wrapper">
        <img
          class="jm-logo"
          src="jm-logo.png"
          alt="JM"
          onerror="this.style.display='none'"
        >
        <div class="hero" id="hero">
          <div class="slide active"><img src="Frame-1.png" alt="Portfolio work 1"></div>
          <div class="slide"><img src="Frame-2.png" alt="Portfolio work 2"></div>
          <div class="slide"><img src="Frame-3.png" alt="Portfolio work 3"></div>
          <div class="slide"><img src="Frame-4.png" alt="Portfolio work 4"></div>
          <div class="slide"><img src="Frame-5.png" alt="Portfolio work 5"></div>
          <div class="slide"><img src="Frame-6.png" alt="Portfolio work 6"></div>
          <div class="hero-dots" id="dots"></div>
        </div>
      </div>

      <p class="coming-soon">New website coming soon...</p>

      <hr class="line-3">

      <footer class="footer">

        <!-- LinkedIn: drop InBug-Black.png into this folder for the official icon -->
        <a class="footer-item" href="https://www.linkedin.com/in/jonmcghee" target="_blank" rel="noopener">
          <img class="linkedin-icon" src="InBug-Black.png" alt="LinkedIn"
            onerror="this.outerHTML='<svg viewBox=\'0 0 24 24\' fill=\'currentColor\' width=\'20\' height=\'20\'><path d=\'M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z\'/></svg>'"
          >
          /jonmcghee
        </a>

        <!-- Email — lucide/mail -->
        <a class="footer-item" href="mailto:jonmcghee@gmail.com">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <polyline points="2,4 12,13 22,4"/>
          </svg>
          jonmcghee@gmail.com
        </a>

        <!-- Phone — lucide/phone-call -->
        <a class="footer-item" href="tel:+447879825500">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15.05 5A5 5 0 0 1 19 8.95M15.05 1A9 9 0 0 1 23 8.94m-1 7.98v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.16 11.9a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.11 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21 16v.92z"/>
          </svg>
          +44 (0) 7879825500
        </a>

      </footer>

    </div>
  </div>
  <script>
    const slides = document.querySelectorAll('.slide');
    const dotsContainer = document.getElementById('dots');
    let current = 0;
    let timer;

    // Build dots
    slides.forEach((_, i) => {
      const btn = document.createElement('button');
      btn.setAttribute('aria-label', 'Slide ' + (i + 1));
      if (i === 0) btn.classList.add('active');
      btn.addEventListener('click', () => { goTo(i); resetTimer(); });
      dotsContainer.appendChild(btn);
    });

    const dots = dotsContainer.querySelectorAll('button');

    function goTo(n) {
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = (n + slides.length) % slides.length;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
    }

    function next() { goTo(current + 1); }

    function resetTimer() {
      clearInterval(timer);
      timer = setInterval(next, 4000);
    }

    resetTimer();
  </script>
</body>
</html>
